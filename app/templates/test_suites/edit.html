{% extends 'base.html' %}
{% block title %}Edit Suite{% endblock %}

{% block content %}
<div class="page-header">
    <div class="page-header-left">
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
            <a href="{{ url_for('projects.view', project_id=suite.project_id) }}" style="color:var(--text-tertiary); text-decoration:none; font-size:0.82rem;">{{ suite.project_name }}</a>
            <span style="color:var(--text-tertiary); font-size:0.75rem;">›</span>
            <a href="{{ url_for('test_suites.view', suite_id=suite.id) }}" style="color:var(--text-tertiary); text-decoration:none; font-size:0.82rem;">{{ suite.name }}</a>
            <span style="color:var(--text-tertiary); font-size:0.75rem;">›</span>
            <span style="font-size:0.82rem; color:var(--text-secondary);">Edit</span>
        </div>
        <h2>Edit Test Suite</h2>
        <p>Update suite details for <strong>{{ suite.name }}</strong></p>
    </div>
</div>

<div class="card" style="max-width:640px;">
    <form method="POST" action="{{ url_for('test_suites.edit', suite_id=suite.id) }}">
        <div class="form-group">
            <label class="form-label required" for="name">Suite Name</label>
            <input type="text" class="form-input" id="name" name="name"
                   value="{{ suite.name }}" required>
        </div>

        <div class="form-group">
            <label class="form-label" for="description">Description</label>
            <textarea class="form-textarea" id="description" name="description"
                      placeholder="What does this suite cover?">{{ suite.description or '' }}</textarea>
        </div>

        <div class="form-group">
            <label class="form-label required" for="priority">Priority</label>
            <select class="form-select" id="priority" name="priority" required>
                <option value="Critical" {{ 'selected' if suite.priority == 'Critical' }}>Critical</option>
                <option value="High" {{ 'selected' if suite.priority == 'High' }}>High</option>
                <option value="Medium" {{ 'selected' if suite.priority == 'Medium' }}>Medium</option>
                <option value="Low" {{ 'selected' if suite.priority == 'Low' }}>Low</option>
            </select>
        </div>

        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:24px;">
            <a href="{{ url_for('test_suites.view', suite_id=suite.id) }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">
                <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
                Save Changes
            </button>
        </div>
    </form>
</div>
{% endblock %}
