{% extends 'base.html' %}
{% block title %}Create Test Suite{% endblock %}

{% block content %}
<div class="page-header">
    <div class="page-header-left">
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
            <a href="{{ url_for('projects.view', project_id=project.id) }}" style="color:var(--text-tertiary); text-decoration:none; font-size:0.82rem;">{{ project.name }}</a>
            <span style="color:var(--text-tertiary); font-size:0.75rem;">›</span>
            <a href="{{ url_for('test_suites.by_project', project_id=project.id) }}" style="color:var(--text-tertiary); text-decoration:none; font-size:0.82rem;">Test Suites</a>
            <span style="color:var(--text-tertiary); font-size:0.75rem;">›</span>
            <span style="font-size:0.82rem; color:var(--text-secondary);">Create</span>
        </div>
        <h2>Create Test Suite</h2>
        <p>Add a new test suite to <strong>{{ project.name }}</strong></p>
    </div>
</div>

<div class="card" style="max-width:640px;">
    <form method="POST" action="{{ url_for('test_suites.create', project_id=project.id) }}">
        <div class="form-group">
            <label class="form-label required" for="name">Suite Name</label>
            <input type="text" class="form-input" id="name" name="name"
                   placeholder="e.g., Authentication Module" value="{{ data.get('name', '') }}" required autofocus>
        </div>

        <div class="form-group">
            <label class="form-label" for="description">Description</label>
            <textarea class="form-textarea" id="description" name="description"
                      placeholder="What does this suite cover? What functionality is being tested?">{{ data.get('description', '') }}</textarea>
        </div>

        <div class="form-group">
            <label class="form-label required" for="priority">Priority</label>
            <select class="form-select" id="priority" name="priority" required>
                <option value="Critical" {{ 'selected' if data.get('priority') == 'Critical' }}>Critical</option>
                <option value="High" {{ 'selected' if data.get('priority') == 'High' }}>High</option>
                <option value="Medium" {{ 'selected' if data.get('priority', 'Medium') == 'Medium' }}>Medium</option>
                <option value="Low" {{ 'selected' if data.get('priority') == 'Low' }}>Low</option>
            </select>
        </div>

        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:24px;">
            <a href="{{ url_for('test_suites.by_project', project_id=project.id) }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">
                <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
                Create Suite
            </button>
        </div>
    </form>
</div>
{% endblock %}
